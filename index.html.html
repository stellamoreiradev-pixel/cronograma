<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENEM Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface2: #1e2026;
  --surface3: #252830;
  --border: #2a2d35;
  --border2: #363a45;
  --text: #e8eaf0;
  --text2: #9097aa;
  --text3: #555d70;
  --accent: #4ade80;
  --accent2: #22c55e;
  --accent-dim: rgba(74,222,128,0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --purple: #a78bfa;
  --radius: 6px;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* LAYOUT */
.sidebar {
  width: 200px;
  min-width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 0;
}
.sidebar-logo {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--accent);
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
}
.sidebar-logo span { color: var(--text3); display: block; font-weight: 400; margin-top: 2px; }
.nav { display: flex; flex-direction: column; gap: 2px; padding: 12px 12px; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  font-weight: 400;
  transition: all 0.15s;
  border: none; background: none; text-align: left; width: 100%;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }

.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.view { display: none; padding: 28px 32px; flex: 1; }
.view.active { display: block; }

/* TOPBAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; color: var(--text2); text-transform: uppercase; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius);
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.05em; cursor: pointer;
  border: 1px solid transparent; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #0a0f0a; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; color: var(--text2); border-color: var(--border2); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
.btn-danger { background: transparent; color: var(--red); border-color: var(--red-dim); }
.btn-danger:hover { background: var(--red-dim); }

/* COUNTDOWN */
.countdown-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.countdown-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; }
.countdown-units { display: flex; gap: 20px; }
.countdown-unit { text-align: center; }
.countdown-num { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--accent); line-height: 1; }
.countdown-unit-label { font-family: var(--font-mono); font-size: 9px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }
.countdown-date { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }

/* STATS GRID */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.stat-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-family: var(--font-mono); font-size: 20px; font-weight: 600; color: var(--text); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* AREA PROGRESS */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }

.areas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.area-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.area-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.area-name { font-size: 12px; font-weight: 500; color: var(--text); }
.area-peso { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.area-bar-bg { height: 3px; background: var(--surface3); border-radius: 2px; margin-bottom: 8px; }
.area-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.area-materias { display: flex; flex-wrap: wrap; gap: 4px; }
.materia-pill {
  font-family: var(--font-mono); font-size: 9px;
  padding: 2px 7px; border-radius: 3px;
  background: var(--surface2); color: var(--text3);
  border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s;
}
.materia-pill:hover { border-color: var(--border2); color: var(--text2); }
.materia-pill.alert { border-color: rgba(251,191,36,0.3); color: var(--amber); background: var(--amber-dim); }

/* PRIORITY RANKING */
.priority-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.priority-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  display: flex; align-items: center; gap: 12px;
  transition: border-color 0.15s;
}
.priority-item:hover { border-color: var(--border2); }
.priority-rank { font-family: var(--font-mono); font-size: 11px; color: var(--text3); width: 18px; text-align: right; flex-shrink: 0; }
.priority-materia { font-size: 13px; font-weight: 500; flex: 1; }
.priority-area-tag { font-family: var(--font-mono); font-size: 9px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
.priority-score-bar { width: 80px; height: 3px; background: var(--surface3); border-radius: 2px; flex-shrink: 0; }
.priority-score-fill { height: 100%; border-radius: 2px; }
.priority-days { font-family: var(--font-mono); font-size: 10px; color: var(--text3); flex-shrink: 0; width: 64px; text-align: right; }
.priority-item.top-1 { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.04); }
.priority-item.top-1 .priority-materia { color: var(--accent); }

/* RECENT SESSIONS */
.sessions-list { display: flex; flex-direction: column; gap: 6px; }
.session-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  display: flex; align-items: center; gap: 12px;
}
.session-date { font-family: var(--font-mono); font-size: 10px; color: var(--text3); width: 36px; flex-shrink: 0; }
.session-materia { font-size: 13px; flex: 1; }
.session-tipo { font-family: var(--font-mono); font-size: 9px; color: var(--text3); }
.session-dur { font-family: var(--font-mono); font-size: 11px; color: var(--text2); flex-shrink: 0; }
.session-q { font-family: var(--font-mono); font-size: 10px; color: var(--text3); flex-shrink: 0; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; padding: 24px;
  width: 420px; max-width: calc(100vw - 40px);
  max-height: calc(100vh - 40px); overflow-y: auto;
}
.modal-title { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; display: block; }
.form-control {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 8px 11px;
  color: var(--text); font-family: var(--font-sans); font-size: 13px;
  outline: none; transition: border-color 0.15s;
  appearance: none; -webkit-appearance: none;
}
.form-control:focus { border-color: var(--accent); }
select.form-control { cursor: pointer; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
.form-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.toggle-expand { background: none; border: none; cursor: pointer; color: var(--text3); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; display: flex; align-items: center; gap: 5px; padding: 0; margin-bottom: 14px; }
.toggle-expand:hover { color: var(--text2); }
.collapsible { display: none; }
.collapsible.open { display: block; }

/* QUESTOES / ERROS */
.erros-list { display: flex; flex-direction: column; gap: 6px; }
.erro-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; align-items: flex-start; gap: 12px;
}
.erro-item.revisado { opacity: 0.45; }
.erro-check { width: 16px; height: 16px; border-radius: 3px; border: 1px solid var(--border2); background: var(--surface2); cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.erro-check.checked { background: var(--accent); border-color: var(--accent); }
.erro-check svg { width: 10px; height: 10px; }
.erro-body { flex: 1; }
.erro-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
.erro-materia { font-size: 12px; font-weight: 500; }
.erro-cat { font-family: var(--font-mono); font-size: 9px; padding: 1px 6px; border-radius: 3px; }
.erro-obs { font-size: 12px; color: var(--text2); }
.erro-date { font-family: var(--font-mono); font-size: 10px; color: var(--text3); flex-shrink: 0; }

.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-pill {
  font-family: var(--font-mono); font-size: 10px; padding: 4px 10px;
  border-radius: 3px; border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text3);
  cursor: pointer; transition: all 0.15s;
}
.filter-pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* SIMULADOS */
.simulado-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px;
}
.simulado-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.simulado-name { font-size: 13px; font-weight: 500; }
.simulado-date { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.simulado-areas { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.simulado-area { text-align: center; }
.simulado-area-name { font-family: var(--font-mono); font-size: 9px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.simulado-area-nota { font-family: var(--font-mono); font-size: 16px; font-weight: 600; }
.simulado-area-detail { font-family: var(--font-mono); font-size: 9px; color: var(--text3); margin-top: 2px; }

/* CONFIGS */
.config-section { margin-bottom: 24px; }
.config-section-title { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.peso-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.peso-area-label { font-size: 13px; flex: 1; }
.peso-slider { flex: 1; accent-color: var(--accent); }
.peso-value { font-family: var(--font-mono); font-size: 12px; color: var(--accent); width: 36px; text-align: right; }
.peso-total { font-family: var(--font-mono); font-size: 11px; padding: 6px 10px; border-radius: 3px; display: inline-flex; gap: 8px; }
.peso-total.ok { background: var(--accent-dim); color: var(--accent); }
.peso-total.err { background: var(--red-dim); color: var(--red); }

.meta-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.meta-label { font-size: 13px; flex: 1; }
.meta-input { width: 70px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 5px 8px; color: var(--text); font-family: var(--font-mono); font-size: 12px; text-align: center; outline: none; }
.meta-input:focus { border-color: var(--accent); }

/* TOAST */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface2); border: 1px solid var(--accent);
  border-radius: var(--radius); padding: 10px 16px;
  font-family: var(--font-mono); font-size: 11px; color: var(--accent);
  z-index: 200; transform: translateY(60px); opacity: 0;
  transition: all 0.25s; pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* EMPTY STATE */
.empty { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }
.empty p { font-size: 13px; line-height: 1.6; }

/* SEMANA CONTENT */
.semana-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 20px; }
.semana-day { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 6px 4px; text-align: center; }
.semana-day-label { font-family: var(--font-mono); font-size: 9px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; }
.semana-day-min { font-family: var(--font-mono); font-size: 11px; color: var(--text2); }
.semana-day.has-study { border-color: rgba(74,222,128,0.3); }
.semana-day.has-study .semana-day-min { color: var(--accent); }
.semana-day.today { border-color: var(--border2); }
.semana-day.today .semana-day-label { color: var(--text2); }

/* scrollbar for modal */
.modal::-webkit-scrollbar { width: 3px; }
.modal::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    ENEM<br><span>tracker / medicina</span>
  </div>
  <nav class="nav">
    <button class="nav-item active" onclick="showView('dashboard')" data-view="dashboard">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      Dashboard
    </button>
    <button class="nav-item" onclick="showView('sessoes')" data-view="sessoes">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
      Sessões
    </button>
    <button class="nav-item" onclick="showView('erros')" data-view="erros">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1L15 13H1L8 1z"/><path d="M8 6v3M8 11v.5"/></svg>
      Erros
    </button>
    <button class="nav-item" onclick="showView('simulados')" data-view="simulados">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12L5 7l3 3 2-4 4 6"/><rect x="1" y="1" width="14" height="14" rx="1"/></svg>
      Simulados
    </button>
    <button class="nav-item" onclick="showView('config')" data-view="config">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>
      Config
    </button>
  </nav>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Dashboard</span>
    <div id="topbar-actions">
      <button class="btn btn-primary" onclick="openModal('sessao')">+ Sessão</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div id="countdown-bar" class="countdown-bar"></div>

    <div class="stats-grid" id="stats-grid"></div>

    <div class="section-header">
      <span class="section-title">Semana atual</span>
    </div>
    <div class="semana-grid" id="semana-grid"></div>

    <div class="section-header">
      <span class="section-title">Prioridade de estudo</span>
    </div>
    <div class="priority-list" id="priority-list"></div>

    <div class="section-header" style="margin-top:20px">
      <span class="section-title">Progresso por área</span>
    </div>
    <div class="areas-grid" id="areas-grid"></div>
  </div>

  <!-- SESSOES -->
  <div class="view" id="view-sessoes">
    <div class="filter-bar" id="sessoes-filters"></div>
    <div class="sessions-list" id="sessoes-list"></div>
  </div>

  <!-- ERROS -->
  <div class="view" id="view-erros">
    <div class="filter-bar" id="erros-filters"></div>
    <div class="erros-list" id="erros-list"></div>
  </div>

  <!-- SIMULADOS -->
  <div class="view" id="view-simulados">
    <div id="simulados-list"></div>
  </div>

  <!-- CONFIG -->
  <div class="view" id="view-config">
    <div class="config-section">
      <div class="config-section-title">Pesos por área</div>
      <div id="pesos-form"></div>
      <div id="peso-total-indicator"></div>
    </div>
    <div class="config-section">
      <div class="config-section-title">Meta semanal (min/semana)</div>
      <div id="metas-form"></div>
    </div>
    <div class="config-section">
      <div class="config-section-title">Dados</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="exportData()">Exportar JSON</button>
        <button class="btn btn-danger" onclick="clearData()">Limpar tudo</button>
      </div>
    </div>
  </div>

</main>

<!-- MODAL SESSÃO -->
<div class="modal-overlay" id="modal-sessao">
  <div class="modal">
    <div class="modal-title">Nova sessão de estudo</div>
    <form id="form-sessao" onsubmit="saveSessao(event)">

      <div class="form-group">
        <label class="form-label">Matéria *</label>
        <select class="form-control" id="s-materia" required onchange="autoArea()">
          <option value="">— selecionar —</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Duração (min) *</label>
          <input class="form-control" id="s-duracao" type="number" min="5" max="600" placeholder="90" required>
        </div>
        <div class="form-group">
          <label class="form-label">Data *</label>
          <input class="form-control" id="s-data" type="date" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Tipo *</label>
        <select class="form-control" id="s-tipo" required>
          <option value="teoria">Teoria</option>
          <option value="exercicio" selected>Exercícios</option>
          <option value="revisao">Revisão</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Questões praticadas</label>
          <input class="form-control" id="s-qtotal" type="number" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Questões erradas</label>
          <input class="form-control" id="s-qerradas" type="number" min="0" placeholder="0">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Fonte / material</label>
        <input class="form-control" id="s-fonte" type="text" placeholder="ex: Livro SAS cap.4" maxlength="60">
        <div class="form-hint">Opcional</div>
      </div>

      <hr class="form-divider">

      <button type="button" class="toggle-expand" onclick="toggleQuestoes()">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4l3 3 3-3"/></svg>
        <span id="questoes-toggle-label">Detalhar erros específicos</span>
      </button>

      <div class="collapsible" id="questoes-detail">
        <div id="questoes-container"></div>
        <button type="button" class="btn btn-ghost" style="font-size:10px;padding:5px 10px" onclick="addQuestao()">+ Adicionar questão</button>
      </div>

      <div class="form-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('sessao')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar sessão</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL SIMULADO -->
<div class="modal-overlay" id="modal-simulado">
  <div class="modal">
    <div class="modal-title">Registrar simulado</div>
    <form id="form-simulado" onsubmit="saveSimulado(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nome</label>
          <input class="form-control" id="sim-nome" type="text" placeholder="ENEM 2023 Dia 1" required>
        </div>
        <div class="form-group">
          <label class="form-label">Data</label>
          <input class="form-control" id="sim-data" type="date" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-control" id="sim-tipo">
          <option value="enem_oficial">ENEM oficial</option>
          <option value="cursinho">Cursinho</option>
          <option value="personalizado">Personalizado</option>
        </select>
      </div>
      <hr class="form-divider">
      <div id="sim-areas-form"></div>
      <div class="form-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('simulado')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar simulado</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───
const ENEM_DATE = new Date('2026-11-08');

const MATERIAS = [
  { name: 'Biologia',             area: 'cn' },
  { name: 'Química',              area: 'cn' },
  { name: 'Física',               area: 'cn' },
  { name: 'Matemática',           area: 'mat' },
  { name: 'História',             area: 'ch' },
  { name: 'Geografia',            area: 'ch' },
  { name: 'Filosofia',            area: 'ch' },
  { name: 'Sociologia',           area: 'ch' },
  { name: 'Gramática',            area: 'ling' },
  { name: 'Interpretação de Texto', area: 'ling' },
  { name: 'Literatura',           area: 'ling' },
  { name: 'Atualidades',          area: 'ling' },
  { name: 'Inglês',               area: 'ling' },
];

const AREAS = {
  cn:   { label: 'Ciências da Natureza', color: '#4ade80', abbr: 'CN' },
  mat:  { label: 'Matemática',           color: '#60a5fa', abbr: 'MAT' },
  ch:   { label: 'Ciências Humanas',     color: '#fbbf24', abbr: 'CH' },
  ling: { label: 'Linguagens',           color: '#a78bfa', abbr: 'LING' },
};

const CAT_LABELS = { conceito:'Conceito', calculo:'Cálculo', interpretacao:'Interpretação', distracao:'Distração' };
const CAT_COLORS = { conceito:'#f87171', calculo:'#fbbf24', interpretacao:'#a78bfa', distracao:'#9097aa' };

function defaultConfig() {
  return {
    pesos: { cn: 0.35, mat: 0.30, ch: 0.20, ling: 0.15 },
    metas: { cn: 300, mat: 240, ch: 180, ling: 150 },
  };
}

function loadData() {
  try { return JSON.parse(localStorage.getItem('enem_data') || 'null') || { sessoes:[], erros:[], simulados:[], config: defaultConfig() }; }
  catch(e) { return { sessoes:[], erros:[], simulados:[], config: defaultConfig() }; }
}
function saveData(d) { localStorage.setItem('enem_data', JSON.stringify(d)); }

let DB = loadData();
if (!DB.config) DB.config = defaultConfig();

// ─── ROUTING ───
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelector(`[data-view="${v}"]`).classList.add('active');
  const titles = { dashboard:'Dashboard', sessoes:'Sessões de estudo', erros:'Caderno de erros', simulados:'Simulados', config:'Configurações' };
  document.getElementById('topbar-title').textContent = titles[v];

  const actions = document.getElementById('topbar-actions');
  if (v === 'dashboard' || v === 'sessoes') {
    actions.innerHTML = '<button class="btn btn-primary" onclick="openModal(\'sessao\')">+ Sessão</button>';
  } else if (v === 'simulados') {
    actions.innerHTML = '<button class="btn btn-primary" onclick="openSimuladoModal()">+ Simulado</button>';
  } else if (v === 'config') {
    actions.innerHTML = '<button class="btn btn-primary" onclick="saveConfig()">Salvar config</button>';
  } else {
    actions.innerHTML = '';
  }

  if (v === 'dashboard') renderDashboard();
  if (v === 'sessoes') renderSessoes();
  if (v === 'erros') renderErros();
  if (v === 'simulados') renderSimulados();
  if (v === 'config') renderConfig();
}

// ─── COUNTDOWN ───
function renderCountdown() {
  const now = new Date();
  const diff = ENEM_DATE - now;
  const days = Math.floor(diff / 86400000);
  const weeks = Math.floor(days / 7);
  const months = Math.floor(days / 30);
  const d = days % 7;
  document.getElementById('countdown-bar').innerHTML = `
    <div>
      <div class="countdown-label">ENEM 2026</div>
      <div class="countdown-date" style="margin-top:4px">08 de novembro de 2026 · Dias ${days > 0 ? 'restantes' : 'passados'}</div>
    </div>
    <div class="countdown-units">
      <div class="countdown-unit"><div class="countdown-num">${Math.abs(days)}</div><div class="countdown-unit-label">dias</div></div>
      <div class="countdown-unit" style="color:var(--text3)"><div class="countdown-num" style="color:var(--text3);font-size:14px">${Math.abs(weeks)}s ${Math.abs(d)}d</div><div class="countdown-unit-label">semanas</div></div>
    </div>
  `;
}

// ─── STATS ───
function renderStats() {
  const now = new Date(); now.setHours(0,0,0,0);
  const today = now.toISOString().slice(0,10);
  const weekAgo = new Date(now - 7*86400000).toISOString().slice(0,10);
  const monthAgo = new Date(now - 30*86400000).toISOString().slice(0,10);

  const minToday = DB.sessoes.filter(s=>s.data===today).reduce((a,s)=>a+s.duracao,0);
  const minWeek  = DB.sessoes.filter(s=>s.data>=weekAgo).reduce((a,s)=>a+s.duracao,0);
  const minMonth = DB.sessoes.filter(s=>s.data>=monthAgo).reduce((a,s)=>a+s.duracao,0);

  const diasSet = new Set(DB.sessoes.filter(s=>s.data>=weekAgo).map(s=>s.data));
  const consistencia = diasSet.size;

  const fmt = m => m >= 60 ? `${Math.floor(m/60)}h${m%60?String(m%60).padStart(2,'0'):''}` : `${m}min`;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Hoje</div><div class="stat-value">${fmt(minToday)}</div><div class="stat-sub">${DB.sessoes.filter(s=>s.data===today).length} sessões</div></div>
    <div class="stat-card"><div class="stat-label">Esta semana</div><div class="stat-value">${fmt(minWeek)}</div><div class="stat-sub">últimos 7 dias</div></div>
    <div class="stat-card"><div class="stat-label">Este mês</div><div class="stat-value">${fmt(minMonth)}</div><div class="stat-sub">últimos 30 dias</div></div>
    <div class="stat-card"><div class="stat-label">Consistência</div><div class="stat-value">${consistencia}<span style="font-size:12px;color:var(--text3)">/7</span></div><div class="stat-sub">dias c/ estudo</div></div>
  `;
}

// ─── SEMANA ───
function renderSemana() {
  const now = new Date(); now.setHours(0,0,0,0);
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let html = '';
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now - i*86400000);
    const ds = d.toISOString().slice(0,10);
    const min = DB.sessoes.filter(s=>s.data===ds).reduce((a,s)=>a+s.duracao,0);
    const isToday = i === 0;
    const hasStudy = min > 0;
    html += `<div class="semana-day ${hasStudy?'has-study':''} ${isToday?'today':''}">
      <div class="semana-day-label">${days[d.getDay()]}</div>
      <div class="semana-day-min">${min ? (min>=60?Math.floor(min/60)+'h':min+'m') : '—'}</div>
    </div>`;
  }
  document.getElementById('semana-grid').innerHTML = html;
}

// ─── PRIORITY SCORE ───
function computeScore(materia) {
  const area = MATERIAS.find(m=>m.name===materia)?.area || 'ling';
  const peso = DB.config.pesos[area] || 0.15;
  const meta = DB.config.metas[area] || 180;
  const now = new Date(); now.setHours(0,0,0,0);
  const cutoff14 = new Date(now - 14*86400000).toISOString().slice(0,10);

  const minRecentes = DB.sessoes
    .filter(s => s.materia === materia && s.data >= cutoff14)
    .reduce((a,s) => a + s.duracao, 0);

  const cobertura = Math.min(1, minRecentes / (meta * 2));

  const lastSessao = DB.sessoes.filter(s=>s.materia===materia).sort((a,b)=>b.data.localeCompare(a.data))[0];
  let diasSem = 30;
  if (lastSessao) {
    const last = new Date(lastSessao.data); last.setHours(0,0,0,0);
    diasSem = Math.max(0, (now - last) / 86400000);
  }
  const decaimento = 1 + diasSem / 7;
  return peso * (1 - cobertura) * decaimento;
}

function renderPriority() {
  const ranked = MATERIAS.map(m => ({ ...m, score: computeScore(m.name) }))
    .sort((a,b) => b.score - a.score);

  const maxScore = ranked[0]?.score || 1;

  const now = new Date(); now.setHours(0,0,0,0);
  document.getElementById('priority-list').innerHTML = ranked.slice(0,8).map((m, i) => {
    const lastSessao = DB.sessoes.filter(s=>s.materia===m.name).sort((a,b)=>b.data.localeCompare(a.data))[0];
    let diasLabel = 'nunca';
    if (lastSessao) {
      const last = new Date(lastSessao.data); last.setHours(0,0,0,0);
      const d = Math.round((now-last)/86400000);
      diasLabel = d === 0 ? 'hoje' : d === 1 ? 'ontem' : `${d}d atrás`;
    }
    const area = AREAS[m.area];
    const pct = Math.round((m.score/maxScore)*100);
    return `<div class="priority-item ${i===0?'top-1':''}">
      <span class="priority-rank">${i+1}</span>
      <span class="priority-materia">${m.name}</span>
      <span class="priority-area-tag" style="background:${area.color}22;color:${area.color};border:1px solid ${area.color}44">${area.abbr}</span>
      <div class="priority-score-bar"><div class="priority-score-fill" style="width:${pct}%;background:${area.color}"></div></div>
      <span class="priority-days">${diasLabel}</span>
    </div>`;
  }).join('');
}

// ─── AREAS GRID ───
function renderAreas() {
  const now = new Date(); now.setHours(0,0,0,0);
  const cutoff14 = new Date(now - 14*86400000).toISOString().slice(0,10);

  document.getElementById('areas-grid').innerHTML = Object.entries(AREAS).map(([key, area]) => {
    const peso = DB.config.pesos[key];
    const meta = DB.config.metas[key];
    const minRecentes = DB.sessoes.filter(s=>MATERIAS.find(m=>m.name===s.materia)?.area===key && s.data>=cutoff14).reduce((a,s)=>a+s.duracao,0);
    const cobertura = Math.min(1, minRecentes / (meta * 2));
    const pct = Math.round(cobertura * 100);

    const materias = MATERIAS.filter(m=>m.area===key);
    const pillsHtml = materias.map(m => {
      const minM = DB.sessoes.filter(s=>s.materia===m.name && s.data>=cutoff14).reduce((a,s)=>a+s.duracao,0);
      const alert = minM === 0;
      return `<span class="materia-pill ${alert?'alert':''}">${m.name}</span>`;
    }).join('');

    return `<div class="area-card">
      <div class="area-header">
        <div class="area-name">${area.label}</div>
        <div class="area-peso">peso ${Math.round(peso*100)}%</div>
      </div>
      <div class="area-bar-bg"><div class="area-bar-fill" style="width:${pct}%;background:${area.color}"></div></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-bottom:8px">${pct}% da meta (14d)</div>
      <div class="area-materias">${pillsHtml}</div>
    </div>`;
  }).join('');
}

// ─── DASHBOARD ───
function renderDashboard() {
  renderCountdown();
  renderStats();
  renderSemana();
  renderPriority();
  renderAreas();
}

// ─── SESSOES VIEW ───
function renderSessoes() {
  const areas = ['todas', ...Object.keys(AREAS)];
  let activeFilter = 'todas';

  function render(filter) {
    activeFilter = filter;
    document.getElementById('sessoes-filters').innerHTML = areas.map(a =>
      `<span class="filter-pill ${activeFilter===a?'active':''}" onclick="filterSessoes('${a}')">${a==='todas'?'Todas':AREAS[a]?.abbr||a}</span>`
    ).join('');

    const sorted = [...DB.sessoes].sort((a,b)=>b.data.localeCompare(a.data));
    const filtered = filter === 'todas' ? sorted : sorted.filter(s => MATERIAS.find(m=>m.name===s.materia)?.area === filter);

    if (!filtered.length) {
      document.getElementById('sessoes-list').innerHTML = '<div class="empty"><div class="empty-icon">○</div><p>Nenhuma sessão registrada ainda.</p></div>';
      return;
    }
    document.getElementById('sessoes-list').innerHTML = filtered.map(s => {
      const area = AREAS[MATERIAS.find(m=>m.name===s.materia)?.area];
      const fmt = m => m>=60?`${Math.floor(m/60)}h${m%60?String(m%60).padStart(2,'0'):''}`:m+'min';
      const tipoLabel = {teoria:'teoria',exercicio:'exer',revisao:'rev'}[s.tipo]||s.tipo;
      const qInfo = s.qtotal > 0 ? `${s.qtotal-s.qerradas}/${s.qtotal} acertos` : '';
      return `<div class="session-item">
        <span class="session-date">${s.data.slice(5)}</span>
        <div style="display:flex;align-items:center;gap:6px;flex:1">
          <span class="session-materia">${s.materia}</span>
          ${area?`<span style="font-family:var(--font-mono);font-size:9px;padding:1px 5px;border-radius:2px;background:${area.color}22;color:${area.color}">${area.abbr}</span>`:''}
        </div>
        <span class="session-tipo" style="color:var(--text3)">${tipoLabel}</span>
        ${qInfo?`<span class="session-q">${qInfo}</span>`:''}
        <span class="session-dur">${fmt(s.duracao)}</span>
      </div>`;
    }).join('');
  }

  window.filterSessoes = (f) => render(f);
  render('todas');
}

// ─── ERROS VIEW ───
function renderErros() {
  const cats = ['todas', ...Object.keys(CAT_LABELS)];
  let activeFilter = 'todas';
  let showRevisados = false;

  function render() {
    document.getElementById('erros-filters').innerHTML =
      cats.map(c => `<span class="filter-pill ${activeFilter===c?'active':''}" onclick="filterErros('${c}')">${c==='todas'?'Todas':CAT_LABELS[c]||c}</span>`).join('') +
      `<span class="filter-pill ${showRevisados?'active':''}" onclick="toggleRevisados()" style="margin-left:auto">Mostrar revisados</span>`;

    let erros = [...DB.erros].sort((a,b)=>b.data.localeCompare(a.data));
    if (!showRevisados) erros = erros.filter(e => !e.revisado);
    if (activeFilter !== 'todas') erros = erros.filter(e => e.categoria === activeFilter);

    if (!erros.length) {
      document.getElementById('erros-list').innerHTML = '<div class="empty"><div class="empty-icon">✓</div><p>Nenhum erro pendente de revisão.</p></div>';
      return;
    }

    document.getElementById('erros-list').innerHTML = erros.map(e => {
      const cor = CAT_COLORS[e.categoria] || 'var(--text3)';
      return `<div class="erro-item ${e.revisado?'revisado':''}" id="erro-${e.id}">
        <div class="erro-check ${e.revisado?'checked':''}" onclick="toggleErroRevisado('${e.id}')">
          ${e.revisado?'<svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><path d="M2 5l2.5 2.5L8 3"/></svg>':''}
        </div>
        <div class="erro-body">
          <div class="erro-meta">
            <span class="erro-materia">${e.materia}</span>
            <span class="erro-cat" style="background:${cor}22;color:${cor};border:1px solid ${cor}44">${CAT_LABELS[e.categoria]||e.categoria}</span>
          </div>
          ${e.observacao?`<div class="erro-obs">${e.observacao}</div>`:''}
          ${e.descricao?`<div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-top:3px">${e.descricao}</div>`:''}
        </div>
        <span class="erro-date">${e.data.slice(5)}</span>
      </div>`;
    }).join('');
  }

  window.filterErros = (f) => { activeFilter=f; render(); };
  window.toggleRevisados = () => { showRevisados=!showRevisados; render(); };
  render();
}

function toggleErroRevisado(id) {
  const e = DB.erros.find(x=>x.id===id);
  if (!e) return;
  e.revisado = !e.revisado;
  e.data_revisao = e.revisado ? new Date().toISOString().slice(0,10) : null;
  saveData(DB);
  renderErros();
}

// ─── SIMULADOS ───
function renderSimulados() {
  if (!DB.simulados.length) {
    document.getElementById('simulados-list').innerHTML = '<div class="empty"><div class="empty-icon">□</div><p>Nenhum simulado registrado ainda.</p></div>';
    return;
  }
  const sorted = [...DB.simulados].sort((a,b)=>b.data.localeCompare(a.data));
  document.getElementById('simulados-list').innerHTML = sorted.map(sim => {
    const areasHtml = Object.entries(AREAS).map(([key, area]) => {
      const res = sim.resultados?.find(r=>r.area===key);
      if (!res) return `<div class="simulado-area"><div class="simulado-area-name">${area.abbr}</div><div class="simulado-area-nota" style="color:var(--text3)">—</div></div>`;
      const nota = Math.round((res.acertos/res.total)*1000)/10;
      const cor = nota >= 70 ? 'var(--accent)' : nota >= 50 ? 'var(--amber)' : 'var(--red)';
      return `<div class="simulado-area">
        <div class="simulado-area-name" style="color:${area.color}">${area.abbr}</div>
        <div class="simulado-area-nota" style="color:${cor}">${nota.toFixed(0)}%</div>
        <div class="simulado-area-detail">${res.acertos}/${res.total}</div>
      </div>`;
    }).join('');
    return `<div class="simulado-card">
      <div class="simulado-header">
        <div><div class="simulado-name">${sim.nome}</div><div class="simulado-date" style="margin-top:3px">${sim.data} · ${sim.tipo.replace('_',' ')}</div></div>
      </div>
      <div class="simulado-areas">${areasHtml}</div>
    </div>`;
  }).join('');
}

// ─── CONFIG ───
function renderConfig() {
  document.getElementById('pesos-form').innerHTML = Object.entries(AREAS).map(([key, area]) =>
    `<div class="peso-row">
      <span class="peso-area-label">${area.label}</span>
      <input type="range" class="peso-slider" min="0" max="100" value="${Math.round(DB.config.pesos[key]*100)}"
        oninput="updatePeso('${key}',this.value)" id="peso-slider-${key}">
      <span class="peso-value" id="peso-val-${key}">${Math.round(DB.config.pesos[key]*100)}%</span>
    </div>`
  ).join('');
  updatePesoTotal();

  document.getElementById('metas-form').innerHTML = Object.entries(AREAS).map(([key, area]) =>
    `<div class="meta-row">
      <span class="meta-label">${area.label}</span>
      <input type="number" class="meta-input" id="meta-${key}" value="${DB.config.metas[key]}" min="30" max="1200">
      <span style="font-size:11px;color:var(--text3);margin-left:4px">min/sem</span>
    </div>`
  ).join('');
}

function updatePeso(key, val) {
  DB.config.pesos[key] = parseInt(val)/100;
  document.getElementById('peso-val-'+key).textContent = val+'%';
  updatePesoTotal();
}

function updatePesoTotal() {
  const total = Object.values(DB.config.pesos).reduce((a,v)=>a+v,0);
  const pct = Math.round(total*100);
  const ok = pct === 100;
  document.getElementById('peso-total-indicator').innerHTML =
    `<div class="peso-total ${ok?'ok':'err'}" style="margin-top:8px">Soma: ${pct}% ${ok?'✓':'— precisa ser 100%'}</div>`;
}

function saveConfig() {
  const total = Object.values(DB.config.pesos).reduce((a,v)=>a+v,0);
  if (Math.round(total*100) !== 100) { showToast('Pesos precisam somar 100%', true); return; }
  Object.keys(AREAS).forEach(k => {
    const v = document.getElementById('meta-'+k)?.value;
    if (v) DB.config.metas[k] = parseInt(v);
  });
  saveData(DB);
  showToast('Configurações salvas');
}

// ─── MODAL SESSAO ───
function openModal(type) {
  if (type === 'sessao') {
    const sel = document.getElementById('s-materia');
    sel.innerHTML = '<option value="">— selecionar —</option>' +
      MATERIAS.map(m=>`<option value="${m.name}">${m.name}</option>`).join('');
    document.getElementById('s-data').value = new Date().toISOString().slice(0,10);
    document.getElementById('s-duracao').value = '';
    document.getElementById('s-qtotal').value = '';
    document.getElementById('s-qerradas').value = '';
    document.getElementById('s-fonte').value = '';
    document.getElementById('s-tipo').value = 'exercicio';
    document.getElementById('questoes-container').innerHTML = '';
    document.getElementById('questoes-detail').classList.remove('open');
    document.getElementById('modal-sessao').classList.add('open');
    setTimeout(()=>sel.focus(), 50);
  }
}

function closeModal(type) {
  document.getElementById('modal-'+type).classList.remove('open');
}

function autoArea() {}

let questaoCount = 0;
function addQuestao() {
  const id = ++questaoCount;
  const container = document.getElementById('questoes-container');
  const div = document.createElement('div');
  div.style = 'background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px';
  div.id = 'questao-'+id;
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">Questão ${id}</span>
      <button type="button" onclick="document.getElementById('questao-${id}').remove()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px">×</button>
    </div>
    <div class="form-row" style="margin-bottom:8px">
      <div><label class="form-label">Referência</label><input class="form-control" id="q${id}-desc" type="text" placeholder="Q12 FUVEST 2022" style="font-size:12px"></div>
      <div><label class="form-label">Resultado</label>
        <select class="form-control" id="q${id}-acertou" style="font-size:12px">
          <option value="0">Errou</option><option value="1">Acertou</option>
        </select>
      </div>
    </div>
    <div id="q${id}-erro-area" style="display:block">
      <div class="form-row">
        <div><label class="form-label">Categoria do erro</label>
          <select class="form-control" id="q${id}-cat" style="font-size:12px">
            ${Object.entries(CAT_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
          </select>
        </div>
        <div><label class="form-label">Observação</label><input class="form-control" id="q${id}-obs" type="text" placeholder="O que errou?" style="font-size:12px"></div>
      </div>
    </div>
  `;
  container.appendChild(div);
  div.querySelector(`#q${id}-acertou`).onchange = function() {
    div.querySelector(`#q${id}-erro-area`).style.display = this.value==='0' ? 'block':'none';
  };
}

function toggleQuestoes() {
  const el = document.getElementById('questoes-detail');
  const label = document.getElementById('questoes-toggle-label');
  el.classList.toggle('open');
  label.textContent = el.classList.contains('open') ? 'Ocultar detalhes de questões' : 'Detalhar erros específicos';
  if (el.classList.contains('open') && !document.getElementById('questoes-container').children.length) addQuestao();
}

function saveSessao(e) {
  e.preventDefault();
  const materia = document.getElementById('s-materia').value;
  const duracao = parseInt(document.getElementById('s-duracao').value);
  const data = document.getElementById('s-data').value;
  const tipo = document.getElementById('s-tipo').value;
  const qtotal = parseInt(document.getElementById('s-qtotal').value) || 0;
  const qerradas = parseInt(document.getElementById('s-qerradas').value) || 0;
  const fonte = document.getElementById('s-fonte').value.trim();

  if (qerradas > qtotal) { showToast('Erradas não pode superar total', true); return; }

  const sessaoId = uuid();
  const sessao = { id: sessaoId, materia, area: MATERIAS.find(m=>m.name===materia)?.area, duracao, data, tipo, qtotal, qerradas, fonte };
  DB.sessoes.push(sessao);

  // collect questoes/erros
  document.querySelectorAll('[id^="questao-"]').forEach(div => {
    const n = div.id.replace('questao-','');
    const desc = div.querySelector(`#q${n}-desc`)?.value||'';
    const acertou = div.querySelector(`#q${n}-acertou`)?.value === '1';
    const qId = uuid();
    DB.erros.push({
      id: qId,
      sessao_id: sessaoId,
      materia, area: sessao.area,
      descricao: desc,
      acertou,
      categoria: !acertou ? (div.querySelector(`#q${n}-cat`)?.value||'conceito') : null,
      observacao: !acertou ? (div.querySelector(`#q${n}-obs`)?.value||'') : '',
      revisado: false,
      data_revisao: null,
      data,
    });
  });

  saveData(DB);
  closeModal('sessao');
  showToast('Sessão salva');
  renderDashboard();
}

// ─── SIMULADO MODAL ───
function openSimuladoModal() {
  document.getElementById('sim-data').value = new Date().toISOString().slice(0,10);
  document.getElementById('sim-nome').value = '';
  document.getElementById('sim-tipo').value = 'enem_oficial';
  const totaisPadrao = { cn:45, mat:45, ch:45, ling:45 };
  document.getElementById('sim-areas-form').innerHTML = Object.entries(AREAS).map(([key, area]) =>
    `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="flex:1;font-size:13px">${area.label}</span>
      <label class="form-label" style="margin:0;width:60px;text-align:right">Acertos</label>
      <input class="form-control" id="sim-ac-${key}" type="number" min="0" max="${totaisPadrao[key]}" placeholder="0" style="width:60px;font-family:var(--font-mono);font-size:13px">
      <span style="color:var(--text3);font-family:var(--font-mono);font-size:12px">/ <input class="form-control" id="sim-tot-${key}" type="number" value="${totaisPadrao[key]}" min="1" max="100" style="width:50px;font-family:var(--font-mono);font-size:12px;display:inline-block;padding:5px 6px"></span>
    </div>`
  ).join('');
  document.getElementById('modal-simulado').classList.add('open');
}

function saveSimulado(e) {
  e.preventDefault();
  const resultados = Object.keys(AREAS).map(key => {
    const acertos = parseInt(document.getElementById('sim-ac-'+key)?.value)||0;
    const total = parseInt(document.getElementById('sim-tot-'+key)?.value)||45;
    return { area: key, acertos, total, nota: Math.round(acertos/total*1000)/10 };
  });
  DB.simulados.push({
    id: uuid(),
    nome: document.getElementById('sim-nome').value,
    data: document.getElementById('sim-data').value,
    tipo: document.getElementById('sim-tipo').value,
    resultados,
  });
  saveData(DB);
  closeModal('simulado');
  showToast('Simulado salvo');
  renderSimulados();
}

// ─── UTILS ───
function uuid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = err ? 'var(--red)' : 'var(--accent)';
  t.style.color = err ? 'var(--red)' : 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'enem-tracker-backup.json'; a.click();
}

function clearData() {
  if (!confirm('Apagar todos os dados? Esta ação não pode ser desfeita.')) return;
  DB = { sessoes:[], erros:[], simulados:[], config: defaultConfig() };
  saveData(DB);
  showToast('Dados apagados');
  renderDashboard();
}

// close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});
